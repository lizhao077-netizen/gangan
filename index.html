<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三重境 - 轮回</title>
    <style>
        /* --- 1. 基础布局 --- */
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #222 no-repeat center center fixed;
            background-size: cover; /* 优先填满 */
            font-family: 'STHeiti', sans-serif; overflow: hidden; transition: 2s ease-in-out;
            touch-action: none;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.15); z-index: 1; pointer-events: none;
        }

        /* --- 2. 特殊 UI 元素 --- */
        #easter-egg-trigger {
            position: absolute; bottom: 0; left: 0;
            width: 150px; height: 150px;
            z-index: 10001; pointer-events: auto;
        }

        #back-btn {
            position: absolute; top: 25px; left: 25px;
            padding: 10px 20px; background: rgba(255,255,255,0.2);
            color: white; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px; cursor: pointer; backdrop-filter: blur(10px);
            z-index: 10002; display: none; pointer-events: auto;
        }

        /* --- 3. 常规 UI --- */
        #global-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; pointer-events: none; }

        .nav-side-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            padding: 20px 15px; background: rgba(0,0,0,0.3); color: white;
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
            backdrop-filter: blur(10px); pointer-events: auto; transition: 0.5s;
            writing-mode: vertical-rl; letter-spacing: 5px; font-size: 14px; display: none;
        }
        #prev-btn { left: 0; border-radius: 0 15px 15px 0; }
        #next-btn { right: 0; border-radius: 15px 0 0 15px; }

        #music-wrap { position: absolute; top: 25px; right: 25px; pointer-events: auto; }
        #music-control { width: 45px; height: 45px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); color: white; font-size: 20px; }
        .rotating { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 右下角留言板触发器 */
        #board-trigger {
            position: absolute; right: 30px; bottom: 30px;
            width: 70px; height: 70px; cursor: pointer; pointer-events: auto;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #board-trigger:hover { transform: scale(1.1); }
        #board-trigger img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* --- 4. 气泡与留言板样式 --- */
        .falling-dialog {
            position: absolute; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 15px;
            backdrop-filter: blur(8px); box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: bubbleRise 12s linear forwards; pointer-events: none;
        }
        @keyframes bubbleRise {
            0% { transform: translateY(110vh) scale(0.7); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.1); opacity: 0; }
        }

        /* 不同页面的气泡风格 */
        .style1 .falling-dialog { border-radius: 50%; background: rgba(255, 255, 255, 0.6); }
        .style2 .falling-dialog { border-radius: 15px; background: rgba(20, 40, 20, 0.7); color: #cfc; }
        .style3 .falling-dialog { border-radius: 30px 30px 5px 30px; background: rgba(255, 230, 230, 0.75); }
        .style-hidden .falling-dialog { border-radius: 10px; background: rgba(30, 30, 40, 0.8); color: #eee; border: 1px solid #666; }

        /* 留言板弹窗控制 */
        #board-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 30000; display: none; justify-content: center; align-items: center; pointer-events: auto; }
        .board-card { background: #f4f4f7; width: 400px; max-height: 85vh; border-radius: 30px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }

        .role-selector { display: flex; justify-content: center; gap: 40px; padding: 10px 0 15px; border-bottom: 1px solid #eee; }
        .role-btn { cursor: pointer; opacity: 0.4; text-align: center; transition: 0.3s; }
        .role-btn.active { opacity: 1; transform: scale(1.1); }
        .role-btn img { width: 55px; height: 55px; border-radius: 50%; border: 3px solid transparent; object-fit: cover; }
        .role-btn.active img { border-color: #007aff; }

        #message-list { flex: 1; overflow-y: auto; margin: 15px 0; padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .history-item { display: flex; flex-direction: column; max-width: 80%; }
        .history-item.left-style { align-self: flex-start; align-items: flex-start; }
        .history-item.right-style { align-self: flex-end; align-items: flex-end; }
        .history-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .history-item.right-style .history-header { flex-direction: row-reverse; }
        .history-item img { width: 26px; height: 26px; border-radius: 50%; }
        .history-name { font-size: 11px; color: #888; font-weight: bold; }
        .history-text { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .left-style .history-text { background: #fff; color: #333; border-top-left-radius: 4px; }
        .right-style .history-text { background: #007aff; color: #fff; border-top-right-radius: 4px; }

        textarea { width: 100%; height: 70px; padding: 12px; box-sizing: border-box; border: none; background: #fff; border-radius: 15px; resize: none; font-size: 14px;}
        .send-btn { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #bubble-space { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body class="style3">

    <div id="global-ui">
        <div id="prev-btn" class="nav-side-btn" onclick="changeLife(-1)">上一世</div>
        <div id="next-btn" class="nav-side-btn" onclick="changeLife(1)">下一世</div>
        <div id="music-wrap"><div id="music-control" onclick="toggleMusic()">🎵</div></div>

        <div id="board-trigger" onclick="openBoard()">
            <img id="trigger-icon" src="">
        </div>

        <div id="back-btn" onclick="exitHiddenPage()">← 返回</div>
        <div id="easter-egg-trigger" onclick="handleEasterEgg()"></div>
    </div>

    <div id="bubble-space"></div>

    <div id="board-overlay" onclick="closeBoard()">
        <div class="board-card" onclick="event.stopPropagation()">
            <div class="role-selector" id="role-list"></div>
            <div id="message-list"></div>
            <textarea id="msg-input" placeholder="写下你想说的话..."></textarea>
            <button class="send-btn" onclick="sendMsg()">发送</button>
        </div>
    </div>

    <script>
        const API_URL = "https://gangan.onrender.com/api/messages";
        const bgm = new Audio(); bgm.loop = true;

        let currentScene = 3;
        let selectedRoleIdx = 1; // 默认选中右侧人物
        let isHiddenPage = false;

        const scenes = [
            { id: 1, roles: ["修", "菲奥娜"], bg: './bg1.png', music: './music1.mp3', style: 'style1', triggerImg: './icon1.png', roleData: [{n:"修", a:"./avatar1.png"}, {n:"菲奥娜", a:"./avatar2.png"}] },
            { id: 2, roles: ["朱懿珩", "怀宁"], bg: './bg2.jpg', music: './music2.mp3', style: 'style2', triggerImg: './icon2.png', roleData: [{n:"朱懿珩", a:"./avatar3.png"}, {n:"怀宁", a:"./avatar4.png"}] },
            { id: 3, roles: ["朴贤宇", "郑宝珠"], bg: './bg3.png', music: './music3.mp3', style: 'style3', triggerImg: './icon3.png', roleData: [{n:"朴贤宇", a:"./avatar5.png"}, {n:"郑宝珠", a:"./avatar6.png"}] },
            // 隐藏彩蛋页
            { id: 4, roles: ["蒋伯架", "程走柳"], bg: './hidden_bg_enhanced.jpg', music: './hidden_music.mp3', style: 'style-hidden', triggerImg: './hidden_icon.png', roleData: [{n:"蒋伯架", a:"./avatar_old_1.png"}, {n:"程走柳", a:"./avatar_old_2.png"}] }
        ];

        function changeLife(direction) {
            if (isHiddenPage) return;
            const newScene = currentScene + direction;
            if (newScene >= 1 && newScene <= 3) renderPage(newScene);
        }

        function renderPage(id) {
            currentScene = id;
            const s = scenes[id - 1];
            document.body.className = s.style;
            document.body.style.backgroundImage = `url(${s.bg})`;
            document.getElementById('trigger-icon').src = s.triggerImg;

            // 彩蛋逻辑显示隐藏
            const canTriggerEgg = (id === 1 && !isHiddenPage);
            document.getElementById('easter-egg-trigger').style.display = canTriggerEgg ? 'block' : 'none';
            document.getElementById('back-btn').style.display = isHiddenPage ? 'block' : 'none';

            // 导航显示逻辑
            const prev = document.getElementById('prev-btn');
            const next = document.getElementById('next-btn');
            if (isHiddenPage) {
                prev.style.display = 'none'; next.style.display = 'none';
            } else {
                prev.style.display = (id === 1) ? 'none' : 'block';
                next.style.display = (id === 3) ? 'none' : 'block';
            }

            const wasPlaying = !bgm.paused;
            bgm.src = s.music;
            if(wasPlaying) bgm.play().catch(()=>{});
            document.getElementById('bubble-space').innerHTML = '';
            loadMessages(false);
        }

        // 彩蛋连击逻辑
        let lastClick = 0;
        function handleEasterEgg() {
            const now = Date.now();
            if (now - lastClick < 500) {
                if (confirm("也许还有一位故人也在这里，要见见他吗？")) {
                    isHiddenPage = true;
                    selectedRoleIdx = 1; // 进入彩蛋页默认选中右侧
                    renderPage(4);
                }
            }
            lastClick = now;
        }

        function exitHiddenPage() {
            isHiddenPage = false;
            selectedRoleIdx = 1;
            renderPage(1);
        }

        function toggleMusic() {
            const m = document.getElementById('music-control');
            if(bgm.paused) { bgm.play(); m.classList.add('rotating'); }
            else { bgm.pause(); m.classList.remove('rotating'); }
        }

        // 手势逻辑
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            if (isHiddenPage) return;
            let diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 80) diff > 0 ? changeLife(-1) : changeLife(1);
        });

        function openBoard() {
            const s = scenes[currentScene - 1];
            document.getElementById('role-list').innerHTML = s.roleData.map((role, i) => `
                <div class="role-btn ${i === selectedRoleIdx ? 'active' : ''}" onclick="selectedRoleIdx=${i};openBoard()">
                    <img src="${role.a}">
                    <div style="font-size:11px;margin-top:5px; font-weight:bold;">${role.n}</div>
                </div>`).join('');
            document.getElementById('board-overlay').style.display = 'flex';
            loadMessages(true);
        }
        function closeBoard() { document.getElementById('board-overlay').style.display = 'none'; }

        async function sendMsg() {
            const content = document.getElementById('msg-input').value;
            if(!content) return;
            const role = scenes[currentScene - 1].roleData[selectedRoleIdx];
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user: role.n, content: content, avatar: role.a })
                });
                document.getElementById('msg-input').value = '';
                loadMessages(true);
                createPopMessage({ user: role.n, content: content });
            } catch(e) {}
        }

        function createPopMessage(msg) {
            const container = document.getElementById('bubble-space');
            const d = document.createElement('div');
            d.className = 'falling-dialog';
            const size = Math.floor(Math.random() * 60) + 120;
            d.style.width = size + 'px'; d.style.height = size + 'px';
            d.style.left = (Math.random() * 75 + 10) + 'vw';

            const isRightRole = (msg.user === "菲奥娜" || msg.user === "怀宁" || msg.user === "郑宝珠" || msg.user === "程走柳");
            const color = isHiddenPage ? "#ccc" : (isRightRole ? "#ff4081" : "#007aff");

            d.innerHTML = `<b style="font-size:11px; color:${color};">${msg.user}</b>
                           <div style="font-size:13px; margin-top:5px;">${msg.content}</div>`;
            container.appendChild(d);
            setTimeout(() => d.remove(), 12000);
        }

        async function loadMessages(updateUIList = false) {
            try {
                const res = await fetch(API_URL);
                const allData = await res.json();
                const currentRoles = scenes[currentScene - 1].roles;
                const filteredData = allData.filter(m => currentRoles.includes(m.user));
                if(updateUIList) {
                    const listEl = document.getElementById('message-list');
                    listEl.innerHTML = filteredData.map(m => {
                        const isRight = (m.user === "菲奥娜" || m.user === "怀宁" || m.user === "郑宝珠" || m.user === "程走柳");
                        return `<div class="history-item ${isRight ? 'right-style' : 'left-style'}">
                            <div class="history-header"><img src="${m.avatar}"><span class="history-name">${m.user}</span></div>
                            <div class="history-text">${m.content}</div>
                        </div>`;
                    }).join('');
                    listEl.scrollTop = listEl.scrollHeight;
                } else {
                    if(document.getElementById('bubble-space').children.length < 3) {
                        filteredData.slice(-3).forEach((m, i) => setTimeout(() => createPopMessage(m), i * 2000));
                    }
                }
            } catch(e) {}
        }

        window.onload = () => {
            renderPage(3);
            if (confirm("是否开启这一世的背景旋律？")) toggleMusic();
            setInterval(() => loadMessages(false), 10000);
        };
    </script>
</body>
</html>
